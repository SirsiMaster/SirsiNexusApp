<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - SirsiNexus Admin</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Shared Admin Styles -->
    <link rel="stylesheet" href="../assets/css/shared.css">
    <link rel="stylesheet" href="../assets/css/common-styles.css">

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="font-inter bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <admin-header breadcrumbs="User Management" user-name="Administrator"></admin-header>
    <admin-sidebar></admin-sidebar>

    <main class="sidebar-content">
        <div class="content-wrapper">
            <div class="page-header">
                <h1>User Management</h1>
                <p class="page-subtitle">Unified registry for platform identities, role synchronization, and security
                    assertions</p>
            </div>

            <!-- User Statistics -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="sirsi-card">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center border border-emerald-100">
                            <i class="fas fa-users text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-2xl font-semibold text-gray-900" id="total-users">0</h3>
                            <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Total Registry
                            </p>
                        </div>
                    </div>
                </div>
                <div class="sirsi-card">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center border border-emerald-100">
                            <i class="fas fa-user-check text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-2xl font-semibold text-gray-900" id="active-users">0</h3>
                            <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Synchronized
                            </p>
                        </div>
                    </div>
                </div>
                <div class="sirsi-card">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center border border-amber-100">
                            <i class="fas fa-user-clock text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-2xl font-semibold text-gray-900" id="pending-users">0</h3>
                            <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Awaiting
                                Verification</p>
                        </div>
                    </div>
                </div>
                <div class="sirsi-card">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center border border-emerald-100">
                            <i class="fas fa-user-shield text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-2xl font-semibold text-gray-900" id="admin-users">0</h3>
                            <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Privileged</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Bar -->
            <div class="flex flex-col md:flex-row gap-4 mb-8 items-center">
                <div class="flex-1 relative w-full">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="user-search"
                        class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm transition-all"
                        placeholder="Filter identities by name, email, or system ID...">
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <button class="btn-primary flex items-center gap-2 whitespace-nowrap px-6 py-3"
                        onclick="showModal('userModal')">
                        <i class="fas fa-plus text-xs"></i>
                        Provision Identity
                    </button>
                    <button class="btn-secondary flex items-center gap-2 whitespace-nowrap px-6 py-3"
                        onclick="exportUsers()">
                        <i class="fas fa-download text-xs"></i>
                        Export Ledger
                    </button>
                </div>
            </div>

            <!-- Table -->
            <div class="sirsi-table-wrap">
                <table class="sirsi-table font-inter">
                    <thead>
                        <tr>
                            <th class="ps-6">ID</th>
                            <th>Identity</th>
                            <th>Email Address</th>
                            <th>Status</th>
                            <th>Role Proxy</th>
                            <th class="text-right pe-6">System Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>

            <div class="mt-6 flex items-center justify-between px-2">
                <div class="text-[10px] font-medium text-gray-400 uppercase tracking-widest">Showing <span
                        id="showing-range">-- to --</span> of <span id="total-count">--</span> Entries</div>
                <div class="flex gap-2" id="pagination-controls">
                    <!-- Populated via JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Base (Tailwind/Vanilla) -->
    <div id="userModal"
        class="hidden fixed inset-0 z-50 overflow-y-auto bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden border border-gray-100">
            <div class="px-8 py-6 border-b border-gray-50 flex items-center justify-between">
                <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-widest italic" id="modalTitle">
                    Identity
                    Provisioning</h2>
                <button onclick="hideModal('userModal')" class="text-gray-400 hover:text-gray-900"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="p-8">
                <form id="userForm" class="space-y-6">
                    <input type="hidden" id="userId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Full Legal
                                Name</label>
                            <input type="text" id="userName"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm"
                                required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Email
                                Identity</label>
                            <input type="email" id="userEmail"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm"
                                required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Assigned
                                Role</label>
                            <select id="userRole"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm">
                                <option value="investor">Investor</option>
                                <option value="partner">Partner</option>
                                <option value="admin">Administrator</option>
                                <option value="super-admin">Super Administrator</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Active
                                State</label>
                            <select id="userStatus"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm">
                                <option value="active">Operational</option>
                                <option value="pending">Awaiting Sync</option>
                                <option value="inactive">Deactivated</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="px-8 py-6 bg-gray-50 border-t border-gray-50 flex justify-end gap-3">
                <button onclick="hideModal('userModal')"
                    class="px-6 py-2.5 text-xs font-semibold text-gray-400 uppercase tracking-widest hover:text-gray-900 transition-colors">Cancel</button>
                <button onclick="saveUser()" class="btn-primary px-8 py-2.5">Confirm Identity</button>
            </div>
        </div>
    </div>

    <script src="../components/admin-header.js"></script>
    <script src="../components/admin-sidebar.js"></script>

    <script>
        // Sample Engine Metadata
        let users = [
            { id: 101, name: 'Cylton Collymore', email: 'cylton@sirsi.ai', status: 'active', role: 'admin' },
            { id: 102, name: 'Demo Investor', email: 'investor@sirsi.ai', status: 'active', role: 'investor' },
            { id: 103, name: 'Beta Investor', email: 'beta@sirsi.ai', status: 'active', role: 'investor' },
            { id: 104, name: 'Guest Access', email: 'guest@sirsi.ai', status: 'active', role: 'guest' }
        ];

        let filteredUsers = [...users];

        function showModal(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        function hideModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('modalTitle').textContent = 'Identity Provisioning';
        }

        function renderTable() {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = filteredUsers.map(user => `
                <tr class="hover:bg-gray-50/50 transition-colors border-b border-gray-100 last:border-0">
                    <td class="ps-6 font-mono text-[11px] text-gray-400">#${user.id}</td>
                    <td class="font-medium text-gray-900">${user.name}</td>
                    <td class="text-gray-500 font-medium">${user.email}</td>
                    <td>
                        <span class="sirsi-badge ${user.status === 'active' ? 'sirsi-badge-success' : user.status === 'pending' ? 'sirsi-badge-warning' : 'sirsi-badge-error'}">
                            ${user.status.toUpperCase()}
                        </span>
                    </td>
                    <td><span class="text-[10px] font-semibold text-gray-500 uppercase tracking-widest">${user.role.replace('-', ' ')}</span></td>
                    <td class="text-right pe-6 space-x-2">
                        <button onclick="editUser(${user.id})" class="text-gray-300 hover:text-emerald-600 transition-colors"><i class="fas fa-fingerprint"></i></button>
                        <button onclick="deleteUser(${user.id})" class="text-gray-300 hover:text-red-600 transition-colors"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');

            document.getElementById('total-users').textContent = users.length;
            document.getElementById('active-users').textContent = users.filter(u => u.status === 'active').length;
            document.getElementById('pending-users').textContent = users.filter(u => u.status === 'pending').length;
            document.getElementById('admin-users').textContent = users.filter(u => u.role.includes('admin')).length;
            document.getElementById('total-count').textContent = filteredUsers.length;
            document.getElementById('showing-range').textContent = `1 to ${filteredUsers.length}`;
        }

        function editUser(id) {
            const user = users.find(u => u.id === id);
            if (!user) return;
            document.getElementById('modalTitle').textContent = 'Re-provisioning Entry';
            document.getElementById('userId').value = user.id;
            document.getElementById('userName').value = user.name;
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userRole').value = user.role;
            document.getElementById('userStatus').value = user.status;
            showModal('userModal');
        }

        function saveUser() {
            const id = document.getElementById('userId').value;
            const data = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                role: document.getElementById('userRole').value,
                status: document.getElementById('userStatus').value
            };

            if (id) {
                const idx = users.findIndex(u => u.id === parseInt(id));
                users[idx] = { ...users[idx], ...data };
            } else {
                users.push({ id: Math.max(...users.map(u => u.id)) + 1, ...data });
            }

            filteredUsers = [...users];
            hideModal('userModal');
            renderTable();
        }

        function deleteUser(id) {
            if (confirm('Authorized request: Procede with identity purge?')) {
                users = users.filter(u => u.id !== id);
                filteredUsers = [...users];
                renderTable();
            }
        }

        // Init Engine
        document.getElementById('user-search').addEventListener('input', (e) => {
            const s = e.target.value.toLowerCase();
            filteredUsers = users.filter(u =>
                u.name.toLowerCase().includes(s) ||
                u.email.toLowerCase().includes(s)
            );
            renderTable();
        });

        renderTable();
    </script>
</body>

</html>
