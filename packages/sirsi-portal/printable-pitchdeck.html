<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sirsi Technologies — Pitch Deck (Print)</title>
    <!-- Sirsi Print UI (Same as MSA) -->
    <link rel="stylesheet" href="../sirsi-sign/public/assets/css/sirsi-print-ui.css?v=1.0.0">
    <style>
        :root {
            --print-body-padding: 0px;
        }

        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: 'Inter', sans-serif;
        }

        /* Each slide fills one landscape page */
        .print-slide {
            width: 9.5in;
            height: 7in;
            margin: 0 auto;
            padding: 0.25in 0.4in;
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
            background: white;
            page-break-after: always;
            break-after: page;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .print-slide:last-child {
            page-break-after: auto;
            break-after: auto;
        }

        /* Screen: show slides stacked vertically for preview */
        @media screen {
            body {
                background: #e5e7eb;
                padding: 20px 0;
            }

            .print-slide {
                margin: 20px auto;
                box-shadow: 0 4px 24px rgba(0,0,0,0.15);
                border: 1px solid #d1d5db;
            }
        }

        /* Print: exact page fit */
        @media print {
            @page {
                size: landscape;
                margin: 0.5in;
            }

            body {
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
            }

            .print-ui-bar, .no-print {
                display: none !important;
            }

            .print-slide {
                width: 100% !important;
                height: auto !important;
                min-height: 6.5in;
                max-height: 7in;
                padding: 0.2in 0.35in !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Kill shadows */
            .print-slide * {
                box-shadow: none !important;
                text-shadow: none !important;
            }
        }

        /* Loading state */
        #loading-msg {
            text-align: center;
            padding: 100px 40px;
            font-size: 1.2rem;
            color: #6b7280;
        }
    </style>
</head>
<body>

    <!-- Print/Save Controls (Exact same component as MSA) -->
    <div class="print-ui-bar no-print">
        <div class="brand">
            <span class="gold">Sirsi</span> Technologies <span class="divider">|</span> Pitch Deck
        </div>
        <div class="actions">
            <button onclick="window.print()" class="print-btn print-btn-gold">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                Print / Save as PDF
            </button>
            <button onclick="window.close()" class="print-btn print-btn-outline">
                Close Window
            </button>
        </div>
    </div>

    <div id="slides-container">
        <div id="loading-msg">Loading slides…</div>
    </div>

    <script>
        /**
         * initializePrintDeck — called by opener window
         * Receives: { slideHTML: string[], styles: string }
         */
        function initializePrintDeck(data) {
            const container = document.getElementById('slides-container');
            container.innerHTML = '';

            // Inject the parent page's computed styles
            if (data.styles) {
                const styleEl = document.createElement('style');
                styleEl.textContent = data.styles;
                document.head.appendChild(styleEl);
            }

            // Inject font links from parent
            if (data.fontLinks) {
                data.fontLinks.forEach(href => {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = href;
                    document.head.appendChild(link);
                });
            }

            // Render each slide
            data.slideHTML.forEach((html, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'print-slide';
                wrapper.innerHTML = html;

                // Reset all zoom on slide-content inside
                const content = wrapper.querySelector('.slide-content');
                if (content) {
                    content.style.zoom = '1';
                }

                // Ensure slide-inner renders properly
                const inner = wrapper.querySelector('.slide-inner');
                if (inner) {
                    inner.style.display = 'flex';
                    inner.style.flexDirection = 'column';
                    inner.style.height = '100%';
                    inner.style.width = '100%';
                    inner.style.position = 'relative';
                    inner.style.paddingBottom = '40px';
                }

                container.appendChild(wrapper);
            });
        }
    </script>

</body>
</html>
