# proto/buf.gen.yaml
version: v2
managed:
  enabled: true
plugins:
  # Go server + client
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  # TypeScript/JavaScript client (React frontends) - PB ES v2 (Schemas)
  - remote: buf.build/bufbuild/es
    out: gen/ts
    opt: target=ts
